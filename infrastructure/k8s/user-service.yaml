apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: shopnow
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/shopnow_user"
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: shopnow
type: Opaque
data:
  # Base64 encoded values for: postgrespassword, superSecuredAndReallyLongSecretKeyForShopNowJWTTokenValidation2026
  SPRING_DATASOURCE_PASSWORD: cG9zdGdyZXNzcGFzc3dvcmQ=
  JWT_SECRET: c3VwZXJTZWN1cmVkQW5kUmVhbGx5TG9uZ1NlY3JldEtleUZvclNob3BOb3dKV1RUb2tlblZhbGlkYXRpb24yMDI2

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopnow
spec:
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: user-service
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopnow
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: user-service
          image: shopnow/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_REDIS_HOST
            - name: SPRING_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: user-service-config
                  key: SPRING_REDIS_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: shopnow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-netpol
  namespace: shopnow
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow incoming traffic from the API Gateway or other services in namespace
    - from:
        - namespaceSelector: {}
  egress:
    # Allow outbound traffic to databases/infra
    - to:
        - namespaceSelector: {}
