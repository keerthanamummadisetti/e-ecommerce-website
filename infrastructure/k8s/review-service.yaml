apiVersion: v1
kind: ConfigMap
metadata:
  name: review-service-config
  namespace: shopnow
data:
  SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/shopnow_review"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  ORDER_SERVICE_URL: "http://order-service:8083"

---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: shopnow
spec:
  ports:
    - port: 8089
      targetPort: 8089
      protocol: TCP
  selector:
    app: review-service
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: shopnow
  labels:
    app: review-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: review-service
          image: shopnow/review-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: review-service-config
                  key: SPRING_DATA_MONGODB_URI
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: review-service-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: review-service-config
                  key: ORDER_SERVICE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: review-service-hpa
  namespace: shopnow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: review-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: review-service-netpol
  namespace: shopnow
spec:
  podSelector:
    matchLabels:
      app: review-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
