worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gateway routing rules
    server {
        listen 80;
        server_name localhost;

        # MS-01: User Service
        location /auth/ {
            proxy_pass http://user-service:8081/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /users/ {
            proxy_pass http://user-service:8081/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-02: Product Catalog Service
        location /products/ {
            proxy_pass http://product-service:8082/products/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-03: Order Management Service
        location /orders/ {
            proxy_pass http://order-service:8083/orders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-04: Payment Service
        location /payments/ {
            proxy_pass http://payment-service:8084/payments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-05: Inventory Service
        location /inventory/ {
            proxy_pass http://inventory-service:8085/inventory/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-06: Shopping Cart Service
        location /cart/ {
            proxy_pass http://cart-service:8086/cart/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-07: Notification Service
        location /notifications/ {
            proxy_pass http://notification-service:8087/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-08: Search Service
        location /search/ {
            proxy_pass http://search-service:8088/search/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-09: Review Service
        location /reviews/ {
            proxy_pass http://review-service:8089/reviews/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MS-10: Analytics Service
        location /analytics/ {
            proxy_pass http://analytics-service:8090/analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Global Gateway Health check
        location /health {
            default_type application/json;
            return 200 '{"status":"UP","gateway":"Nginx reverse proxy active"}';
        }
    }
}
