<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Welcome to ShopNow</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #dddddd; border-radius: 5px; }
        .header { background-color: #007bff; color: #ffffff; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Welcome to ShopNow, {{ name }}!</h2>
        </div>
        <div class="content">
            <p>Dear {{ name }},</p>
            <p>Thank you for registering at ShopNow. Your account has been created successfully.</p>
            <p>Verify email code: <strong>{{ otp_code }}</strong> (Expires in 15 mins).</p>
            <p>Happy Shopping!</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 ShopNow E-Commerce Platform. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
