<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Payment Transaction Failed</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #dddddd; border-radius: 5px; }
        .header { background-color: #e0a800; color: #ffffff; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Payment Failed</h2>
        </div>
        <div class="content">
            <p>Dear Customer,</p>
            <p>Unfortunately, your payment transaction for order <strong>#{{ order_id }}</strong> has failed.</p>
            <p>Reason: <strong>{{ reason }}</strong></p>
            <p>Please try checkout again using another payment method or contact your bank.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 ShopNow E-Commerce Platform. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
