<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Order Placed Successfully</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #dddddd; border-radius: 5px; }
        .header { background-color: #28a745; color: #ffffff; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Order Placed!</h2>
        </div>
        <div class="content">
            <p>Dear Customer,</p>
            <p>Your order <strong>#{{ order_id }}</strong> has been successfully placed.</p>
            <p>Total Amount: <strong>${{ total_amount }}</strong></p>
            <p>We have initiated the payment processing. You will receive another notification once the payment succeeds.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 ShopNow E-Commerce Platform. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
